    <h1>Hello</h1>
    <p>This is a test page</p>

    <div class="flex-container">
      <div>
        <button type="button" onclick="buttonclick('Button Click Event')" style="height:200px;width:200px">Button Click Event</button>
      </div>
      <div>
        <button type="button" onclick="buttonclick('Page View')" style="height:200px;width:200px">Page View</button>
      </div>
      <div>
        <button type="button" onclick="purchase('Triblend Android T-Shirt', 15.25)" style="height:200px;width:200px">Purchase</button>
      </div>
    </div>

    <!-- NEU: Formular-Test -->
    <form onsubmit="formSubmit(); return false;">
      <input type="text" placeholder="Name" required>
      <button type="submit">Submit Form</button>
    </form>

    <!-- NEU: Zusätzliche Buttons für verschiedene Test-Events -->
    <button onclick="buttonclick('Green Button')">Green Button</button>
    <button onclick="buttonclick('Red Button')">Red Button</button>
    <button onclick="purchase('Hat', 9.99)">Buy Hat</button>

    <script>
      // NEU: Pageview-Test beim Laden
      dataLayer.push({ event: "page_view_test" });

      // NEU: Buttonclick mit Namen
      var buttonclick = function(buttonName) {
        dataLayer.push({
          event: "button_click_test",
          button_name: buttonName
        });
        console.log('Button clicked:', buttonName);
      };

      // NEU: Formularsubmit Event
      var formSubmit = function() {
        dataLayer.push({ event: "form_submit_test" });
        console.log("Form submitted!");
      };

      // NEU: E-Commerce Purchase Event
      var purchase = function(productName, value) {
        dataLayer.push({ ecommerce: null }); // reset
        dataLayer.push({
          event: "purchase_test",
          ecommerce: {
            transaction_id: Date.now().toString(),
            value: value,
            currency: "EUR",
            items: [
              {
                item_name: productName,
                item_id: "item_" + Math.floor(Math.random()*1000),
                price: value,
                quantity: 1
              }
            ]
          }
        });
        console.log("Purchase simulated:", productName);
      };

      // NEU: Scroll-Tracking 50%
      window.addEventListener('scroll', function() {
        if ((window.scrollY + window.innerHeight) / document.body.scrollHeight > 0.5) {
          dataLayer.push({ event: "scroll_50_percent" });
          console.log("Scrolled 50% of page");
        }
      }, { once: true });
    </script>
  </body>
